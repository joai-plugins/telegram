interface:
  display_name: "Telegram"
  short_description: "Connect Telegram to Claude, Codex, and ChatGPT through JoAi's hosted MCP app server."
  icon_small: "https://raw.githubusercontent.com/JoAiHQ/assets/refs/heads/main/apps/logos/telegram.svg"
  icon_large: "https://raw.githubusercontent.com/JoAiHQ/assets/refs/heads/main/apps/logos/telegram.svg"
  brand_color: "#2AABEE"
  default_prompt: "List the Telegram tools available in this app."

policy:
  allow_implicit_invocation: true

dependencies:
  tools:
    - type: "mcp"
      value: "joai-telegram"
      description: "Telegram MCP server by JoAi"
      transport: "streamable_http"
      url: "https://cortex.joai.ai/mcp/apps/telegram"
